<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css-grid-1-grid-conatiner-properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- A Grid Container is the parent
element on which you apply grid.
Once this is set, all its direct children
called grid items are arranged
according to the grid layout rules. -->


    <div class="container">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item3</div>
        <div>item3</div>
        <div>item3</div>
    </div>

<!-- 
    A Grid Item is any direct child of a Grid Container.
If you apply display: grid to a container, then only
its immediate children become Grid Items — not
grandchildren or nested elements. -->
</body>
</html>
