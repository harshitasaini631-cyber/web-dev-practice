<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Flexbox is a special layout tool in CSS that helps you arrange
items in a one-dimensional space — either horizontally (row)
or vertically (column) — with flexible sizing and spacing.
It also adjusts the size and position of items automatically,
even when the screen size changes.
Compared to older methods like floats or inline-block,
Flexbox is cleaner, more flexible, and easier to use. -->

<div class="contaier">
    <div class="box">box1</div>
    <div class="box">box2</div>
    <div class="box">box3</div>
</div>
</body>

</html>
