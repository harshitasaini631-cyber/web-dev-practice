<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-wrap</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔹flex-wrap: It tells the browser whether flex items should stay in a single line or
be allowed to wrap onto multiple lines when there isn’t enough space in the
container. -->
    <div class="container">
        <div class="item" id="item1">1</div>
        <div class="item" id="item2">2</div>
        <div class="item" id="item3">3</div>
        <div class="item" id="item4">4</div>
        <div class="item" id="item5">5</div>
        <div class="item" id="item5">5</div>
    </div>
</body>

</html>
