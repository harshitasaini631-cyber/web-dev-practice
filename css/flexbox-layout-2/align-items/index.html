<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>align-items</title>
    <link rel="stylesheet" href="syle.css">
</head>

<body>
    <!-- 🔹align-items defines how flex items are aligned
along the cross axis (perpendicular to the main axis)
of the flex container.
● In flex-direction row, cross axis = vertical
● In flex-direction column, cross axis = horizontal -->

    <div class="container">
        <div class="item" id="item1">1</div>
        <div class="item" id="item2">2</div>
        <div class="item" id="item3">3</div>
    </div>
</body>

</html>
