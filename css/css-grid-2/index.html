    <title>grid item properties</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- grid column.2.Grid Column: grid-column is a CSS property used on
grid items to control how many columns an item should
span and where it should start and end.
grid-column: start / end
start → the grid line number where the item begins
end → the grid line number where the item ends
Eg. grid-column: 1/3
Note: It uses grid line numbers, not column numbers. -->

<!-- 
    <div class="container">
        <div id="box1">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div> -->
    <div class="container">

        <div>5</div>
        <div>6</div>
    </div>
</body>
